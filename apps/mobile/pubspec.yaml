name: osmo_control
description: Osmo 遥控器 — Osmo 设备 Flutter 控制端

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  cookie_jar: ^4.0.8
  http: ^1.4.0
  toastification: ^3.0.3
  cached_network_image: ^3.4.1
  go_router: ^16.0.0
  json_annotation: ^4.9.0
  interactive_chart: ^0.3.6
  intl: ^0.20.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  infinite_scroll_pagination: ^5.1.0
  flutter_svg: ^2.2.0
  countup: ^0.1.4
  qr_flutter: ^4.1.0
  image_picker: ^1.1.2
  path: ^1.9.1
  markdown_widget: ^2.3.2+8
  carousel_slider: ^5.1.1
  url_launcher: ^6.3.2
  logging: ^1.3.0
  photo_view: ^0.15.0
  flutter_image_compress: ^2.4.0
  flutter_blue_plus: ^2.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
